name: Build Mobile APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  GRADLE_OPTS: -Xmx2048m -Dorg.gradle.daemon=false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Pre-install essential Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ || true
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms yet"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools yet"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5 || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5 || true

      - name: Install dependencies
        run: npm ci

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Setup release keystore
        run: |
          KEYSTORE_DIR="android/app"
          KEYSTORE_FILE="$KEYSTORE_DIR/release.keystore"
          mkdir -p "$KEYSTORE_DIR"
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lingjing123 \
            -keypass lingjing123 \
            -dname "CN=LingJing, OU=Development, O=Zhejiang Jinmo, L=Hangzhou, ST=Zhejiang, C=CN" \
            -noprompt
          echo "Keystore generated"
          cat > "$KEYSTORE_DIR/keystore.properties" << EOF
          storeFile=release.keystore
          storePassword=lingjing123
          keyAlias=release
          keyPassword=lingjing123
          EOF

      - name: Build APK
        run: |
          cd android
          BUILD_TYPE="${{ github.event.inputs.buildType || 'release' }}"
          echo "Building $BUILD_TYPE APK..."
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon 2>&1
          else
            ./gradlew assembleDebug --no-daemon 2>&1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingjing-mobile-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
