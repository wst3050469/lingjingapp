name: Build Mobile APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  GRADLE_OPTS: -Xmx2048m -Dorg.gradle.daemon=false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Pre-install essential Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ || true
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms yet"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools yet"
          # Install commonly needed SDK versions
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5 || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5 || true

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Setup release keystore
        run: |
          # Generate a keystore for signing the release APK
          # This ensures the APK is properly signed (fixes install stuck at 85%)
          KEYSTORE_DIR="android/app"
          KEYSTORE_FILE="$KEYSTORE_DIR/release.keystore"
          mkdir -p "$KEYSTORE_DIR"
          
          # Generate keystore with keytool
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lingjing123 \
            -keypass lingjing123 \
            -dname "CN=LingJing, OU=Development, O=Zhejiang Jinmo, L=Hangzhou, ST=Zhejiang, C=CN" \
            -noprompt
          
          echo "Keystore generated at $KEYSTORE_FILE"
          ls -lh "$KEYSTORE_FILE"
          
          # Create keystore.properties for Gradle
          cat > "$KEYSTORE_DIR/keystore.properties" << EOF
          storeFile=release.keystore
          storePassword=lingjing123
          keyAlias=release
          keyPassword=lingjing123
          EOF
          
          echo "keystore.properties created"

      - name: Patch build.gradle for release signing
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            # Add keystore properties loading and release signing config
            # Insert after android { block
            cat >> "$BUILD_GRADLE" << 'PATCH'
            
// [CI] Load keystore for release signing
def keystorePropertiesFile = rootProject.file("app/keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
PATCH
            echo "build.gradle patched with release signing config"
          else
            echo "WARNING: build.gradle not found at $BUILD_GRADLE"
          fi

      - name: Build APK
        run: |
          cd android
          BUILD_TYPE="${{ github.event.inputs.buildType || 'release' }}"
          echo "Building $BUILD_TYPE APK..."
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon 2>&1
          else
            ./gradlew assembleDebug --no-daemon 2>&1
          fi

      - name: Verify APK signing
        run: |
          APK_FILE=$(find android -name "*-release.apk" -o -name "*-debug.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Verifying signing for: $APK_FILE"
            # Check if apksigner is available
            APKSIGNER="$ANDROID_HOME/build-tools/*/apksigner"
            for f in $APKSIGNER; do
              if [ -f "$f" ]; then
                $f verify --print-certs "$APK_FILE" 2>&1 || echo "WARNING: apksigner verify failed"
                break
              fi
            done
            # Alternative: use jarsigner to check
            jarsigner -verify -verbose "$APK_FILE" 2>&1 | head -20 || echo "WARNING: jarsigner check failed"
          else
            echo "No APK file found for verification"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingjing-mobile-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Show APK info
        if: always()
        run: find . -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APK files found"
