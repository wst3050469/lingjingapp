appId: com.lingjing.ide
npmRebuild: false
productName: 灵境
copyright: Copyright © 2026 LingJing AI

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

asarUnpack:
  - "node_modules/node-pty/**"
  - "node_modules/ssh2/**"
  - "node_modules/cpu-features/**"
  - "node_modules/sql.js/**"
  - "node_modules/bcryptjs/**"
  - "node_modules/**/*.node"
  - "node_modules/**/*.wasm"

directories:
  output: release-v17226

files:
  - dist/**/*
  - renderer/**/*
  - node_modules/**/*
  - package.json
  - sql-wasm.wasm

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: LingJing-Setup-${version}-win-x64.exe

portable:
  artifactName: LingJing-Portable-${version}-win-x64.${ext}

mac:
  target:
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.png
  category: public.app-category.developer-tools
  artifactName: LingJing-${version}-mac-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  maintainer: LingJing AI <support@lingjing.ai>
  category: Development
  executableName: lingjing
  artifactName: LingJing-${version}-linux-x86_64.${ext}

extraResources: []

publish:
  provider: generic
  url: https://ide.zhejiangjinmo.com/downloads/
