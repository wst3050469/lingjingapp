server {
    server_name ide.zhejiangjinmo.com download.lingjing.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Downloads: serve directly
    location ^~ /downloads/ {
        alias /var/www/downloads/;
        autoindex off;
    }

    # Download static files at root level (exe, AppImage, deb, yml, blockmap)
    location ~* \.(exe|AppImage|deb|yml|blockmap)$ {
        root /var/www/downloads;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA root-level redirects - exact matches take priority over regex
    location = /versions {
        return 301 /admin/versions;
    }

    # Admin SPA root-level routes - proxy to Express for React Router History API fallback
    location ~ ^/(login|users|devices|sync|subscriptions|plans|payments|payment-config|logs|settings|tenants|schedules|webhooks|api-keys)(/.*)?$ {
        limit_req zone=admin burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/html;
        autoindex off;
        index index.html index.htm;
    }

    # /login redirect to admin panel
    location = /login {
        return 301 /admin/login;
    }

    # Cloud API: proxy to cloud-server (port 8000)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /admin → /admin/ redirect (trailing slash required by proxy)
    location = /admin {
        return 301 /admin/;
    }

    # Admin panel: proxy to cloud-server (port 8000)
    location /admin/ {
        limit_req zone=admin burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for mobile desktop relay (cloud-server 8000)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # APK download (China acceleration node)
    location ^~ /apk/ {
        alias /var/www/html/apk/;
        add_header Cache-Control "public, max-age=86400";
        default_type application/octet-stream;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://ide.zhejiangjinmo.com;" always;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/ide.zhejiangjinmo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ide.zhejiangjinmo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name ide.zhejiangjinmo.com download.lingjing.ai;

    # Security headers (HTTP - used before redirect)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location ^~ /apk/ {
        alias /var/www/html/apk/;
        add_header Cache-Control "public, max-age=86400";
        default_type application/octet-stream;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
