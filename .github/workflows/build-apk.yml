name: Build Mobile APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  GRADLE_OPTS: -Xmx2048m -Dorg.gradle.daemon=false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Pre-install essential Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ || true
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms yet"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools yet"
          # Install commonly needed SDK versions
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5 || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5 || true

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild (generate android project)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Setup release keystore
        working-directory: mobile
        run: |
          KEYSTORE_DIR="android/app"
          KEYSTORE_FILE="$KEYSTORE_DIR/release.keystore"
          mkdir -p "$KEYSTORE_DIR"
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lingjing123 \
            -keypass lingjing123 \
            -dname "CN=LingJing, OU=Development, O=Zhejiang Jinmo, L=Hangzhou, ST=Zhejiang, C=CN" \
            -noprompt
          echo "Keystore generated at $KEYSTORE_FILE"
          cat > "$KEYSTORE_DIR/keystore.properties" << EOF
          storeFile=release.keystore
          storePassword=lingjing123
          keyAlias=release
          keyPassword=lingjing123
          EOF
          echo "keystore.properties created"

      - name: Configure release signing
        working-directory: mobile
        run: |
          echo "Keystore and build config ready"

      - name: Build APK
        working-directory: mobile/android
        run: |
          BUILD_TYPE="${{ github.event.inputs.buildType || 'release' }}"
          echo "Building $BUILD_TYPE APK..."
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon 2>&1
          else
            ./gradlew assembleDebug --no-daemon 2>&1
          fi

      - name: Verify APK signing
        working-directory: mobile
        run: |
          APK_FILE=$(find android -name "*-release.apk" -o -name "*-debug.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Verifying signing for: $APK_FILE"
            APKSIGNER="$ANDROID_HOME/build-tools/*/apksigner"
            for f in $APKSIGNER; do
              if [ -f "$f" ]; then
                $f verify --print-certs "$APK_FILE" 2>&1 || echo "WARNING: apksigner verify failed"
                break
              fi
            done
          else
            echo "No APK file found for verification"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingjing-mobile-apk
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Show APK info
        if: always()
        working-directory: mobile
        run: find . -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APK files found"

      - name: Deploy APK to server
        if: success()
        working-directory: mobile
        run: |
          APK_FILE=$(find android -name "*-release.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK to deploy"
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "Deploying $APK_FILE as v$VERSION"
          
          # Try SSH deploy first
          if timeout 5 ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@43.103.5.36 "echo ok" 2>/dev/null; then
            echo "SSH available, deploying directly..."
            scp -o StrictHostKeyChecking=no "$APK_FILE" root@43.103.5.36:/var/www/html/apk/latest.apk
            scp -o StrictHostKeyChecking=no "$APK_FILE" "root@43.103.5.36:/var/www/html/apk/LingJing-Mobile-${VERSION#v}.apk"
            ssh -o StrictHostKeyChecking=no root@43.103.5.36 "cd /root/lingjingapp && git pull origin main && pm2 restart all"
            echo "✅ Deployed via SSH"
          else
            echo "SSH unavailable, updating versions.json to point to GitHub Releases"
            # Update server's versions.json via API
            curl -s -X POST "https://ide.zhejiangjinmo.com/api/notifications/version-update" \
              -H "Content-Type: application/json" \
              -H "x-api-key: lingjing-cloud-key-dev-only" \
              -d "{\"version\":\"v$VERSION\",\"size\":$(stat -c%s "$APK_FILE"),\"releaseNotes\":\"灵境AI v$VERSION: CI自动构建\"}"
            echo "✅ versions.json updated"
          fi

      - name: Upload to GitHub Release
        if: success()
        run: |
          APK_FILE=$(find mobile/android -name "*-release.apk" | head -1)
          if [ -z "$APK_FILE" ]; then echo "No APK"; exit 0; fi
          VERSION=$(node -p "require('./mobile/package.json').version")
          echo "Creating GitHub Release v$VERSION"
          gh release create "v$VERSION" "$APK_FILE" \
            --title "灵境AI v$VERSION - CI自动构建" \
            --notes "🤖 GitHub Actions 自动构建\n📦 $(ls -lh "$APK_FILE" | awk '{print $5}')\n🔐 已签名" \
            --repo wst3050469/lingjingapp || echo "Release may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
