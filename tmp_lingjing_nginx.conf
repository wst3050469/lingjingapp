# 灵境 LingJing APP 专属站点
server {
    server_name lingjing.zhejiangjinmo.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/lingjing;
    }

    # 灵境版本API: 代理到专用 lingjing-update-server (3002 端口)
    location /api/latest {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/versions {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 灵境后台API (非版本): 代理到 cloud-server (8000 端口)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (云同步)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # latest.yml / latest-linux.yml (electron-updater)
    location /latest.yml {
        proxy_pass http://127.0.0.1:3002;
    }
    location /latest-linux.yml {
        proxy_pass http://127.0.0.1:3002;
    }

    # 静态文件
    location / {
        root /var/www/lingjing;
        autoindex off;
        index index.html index.htm;
    }

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/octet-stream;

    # 缓存大文件 (安装包)
    location ~* \.(exe|AppImage|deb|apk)$ {
        root /var/www/lingjing;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 不缓存 HTML
    location ~* \.html$ {
        root /var/www/lingjing;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 缓存小文件
    location ~* \.(css|js|yml|json)$ {
        root /var/www/lingjing;
        expires 1h;
    }

    listen [::]:443 ssl;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/lingjing.zhejiangjinmo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lingjing.zhejiangjinmo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = lingjing.zhejiangjinmo.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name lingjing.zhejiangjinmo.com;
    return 404;
}
