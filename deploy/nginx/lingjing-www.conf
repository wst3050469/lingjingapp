server {
    listen 80;
    server_name www.spiritrealmz.com spiritrealmz.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html/spiritrealmz;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
server {
    listen 443 ssl http2;
    server_name www.spiritrealmz.com spiritrealmz.com;

    ssl_certificate /etc/letsencrypt/live/www.spiritrealmz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.spiritrealmz.com/privkey.pem;
    ssl_certificate /etc/letsencrypt/live/www.spiritrealmz-ecdsa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.spiritrealmz-ecdsa/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # ── 通用安全头（仅对没有自己 add_header 的 location 生效）──
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-Frame-Options 'DENY' always;
    add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy 'camera=(), microphone=(), geolocation=()' always;

    # ── 管理后台 ──
    location ~ ^/admin/assets/.+\.(js|css)$ {
        proxy_pass http://127.0.0.1:8900;
        expires 1y;
        add_header Cache-Control 'public, immutable, max-age=31536000' always;
        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Frame-Options 'DENY' always;
        add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8900/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        add_header Pragma 'no-cache' always;
        add_header Expires '0' always;
        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Frame-Options 'DENY' always;
        add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    }
    location = /admin { return 301 /admin/; }

    # ── API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8900;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 更新服务 ──
    location /api/latest { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
    location /api/transcribe { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /api/versions { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }
    location /latest.yml { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; }

    # ── WebSocket ──
    location /api/v1/asr/ {
        proxy_pass http://127.0.0.1:8900;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8900;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── 健康检查 ──
    location = /health { proxy_pass http://127.0.0.1:8900; proxy_set_header Host $host; }

    # ── APK 下载 ──
    location /apk/ {
        root /var/www/html/spiritrealmz;
        add_header Content-Disposition 'attachment' always;
        add_header Cache-Control 'public, max-age=86400' always;
        add_header X-Content-Type-Options 'nosniff' always;
        sendfile on; tcp_nopush on;
    }

    # ── 下载目录（关闭自动索引）──
    location /downloads/ {
        root /var/www/html/spiritrealmz;
        autoindex off;
    }

    # ── 静态站点 ──
    location / {
        root /var/www/html/spiritrealmz;
        try_files $uri $uri/ /index.html;
    }

    # ── Cloud管理API ──
    location /cloud/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
