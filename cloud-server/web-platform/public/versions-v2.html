<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵境版本管理 - 扩展面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:24px;min-height:100vh}
h1{font-size:1.5rem;color:#58a6ff;margin-bottom:20px;border-bottom:1px solid #21262d;padding-bottom:12px}
.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:20px;margin-bottom:16px}
.card-title{color:#58a6ff;font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.form-row{margin-bottom:14px}
label{display:block;color:#8b949e;font-size:0.8rem;margin-bottom:4px}
input[type="text"],textarea{width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.9rem}
input[type="text"]:focus,textarea:focus{outline:none;border-color:#58a6ff}
textarea{height:64px;resize:vertical}
.platform-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.platform-box{background:rgba(255,255,255,0.04);border:1px solid #30363d;border-radius:6px;padding:8px}
.platform-box label{font-size:0.75rem;color:#8b949e;margin-bottom:4px}
button{background:#1f6feb;color:#fff;border:none;border-radius:6px;padding:10px 24px;font-size:0.9rem;cursor:pointer;font-weight:600}
button:hover{background:#388bfd}
button:disabled{opacity:0.5;cursor:not-allowed}
button.danger{background:#da3633}
button.danger:hover{background:#f85149}
button.success{background:#238636}
button.success:hover{background:#2ea043}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:4px 12px;font-size:0.8rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;color:#8b949e;font-size:0.8rem;font-weight:600;text-transform:uppercase;border-bottom:2px solid #21262d}
td{padding:10px 12px;border-bottom:1px solid #21262d;font-size:0.85rem}
td .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.badge.draft{background:rgba(139,148,158,0.15);color:#8b949e}
.badge.pending_review{background:rgba(210,153,34,0.15);color:#d29922}
.badge.published{background:rgba(63,185,80,0.15);color:#3fb950}
.dl-links{display:flex;flex-wrap:wrap;gap:4px}
.dl-link{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;text-decoration:none;color:#fff}
.dl-link.win{background:#1f6feb}
.dl-link.linux{background:#238636}
.dl-link.android{background:#9e6a03}
.error{color:#f85149;font-size:0.85rem;padding:8px;background:rgba(248,81,73,0.1);border-radius:4px;margin-bottom:12px}
.success-msg{color:#3fb950;font-size:0.85rem;padding:8px;background:rgba(63,185,80,0.1);border-radius:4px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<h1>📦 灵境版本管理 - 扩展面板</h1>
<div id="app" class="loading">加载中...</div>

<script>
const API_BASE = '/api';
let ADMIN_TOKEN = '';
let versions = [];
let editingId = null;

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (ADMIN_TOKEN) headers['Authorization'] = 'Bearer ' + ADMIN_TOKEN;
  const res = await fetch(API_BASE + path, { ...opts, headers: { ...headers, ...opts.headers } });
  if (!res.ok) throw new Error(await res.text().then(t => t || res.statusText));
  if (res.status === 204) return null;
  return res.json();
}

async function init() {
  // Try to get admin token from localStorage
  ADMIN_TOKEN = localStorage.getItem('admin_token') || '';
  if (!ADMIN_TOKEN) {
    document.getElementById('app').innerHTML = '<div class="card"><div class="card-title">管理员登录</div><div class="form-row"><input type="password" id="pwInput" placeholder="管理员密码" onkeydown="if(event.key===\\'Enter\\')doLogin()"></div><button onclick="doLogin()">登录</button></div>';
    return;
  }
  await loadVersions();
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  try {
    const r = await api('/admin/login', { method: 'POST', body: JSON.stringify({ username: 'admin', password: pw }) });
    ADMIN_TOKEN = r.token;
    localStorage.setItem('admin_token', r.token);
    await loadVersions();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="error">登录失败: ' + e.message + '</div>';
  }
}

async function loadVersions() {
  document.getElementById('app').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('/versions');
    versions = Array.isArray(data) ? data : [];
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="error">加载版本列表失败: ' + e.message + '</div>';
  }
}

function statusBadge(status) {
  const cls = status === 'published' ? 'published' : status === 'pending_review' ? 'pending_review' : 'draft';
  const label = status === 'published' ? '已发布' : status === 'pending_review' ? '审核中' : '草稿';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}

function dlButton(url, label, cls) {
  if (!url) return '';
  return '<a href="' + url + '" target="_blank" class="dl-link ' + cls + '">' + label + '</a>';
}

function renderForm(v) {
  const isEdit = !!v;
  const ver = v ? v.version : '';
  const changelog = v ? v.changelog : '';
  const dw = v ? (v.downloadUrls?.windows || v.downloadUrl || '') : '';
  const dl = v ? (v.downloadUrls?.linux || '') : '';
  const da = v ? (v.downloadUrls?.android || '') : '';
  
  return '<div class="card">' +
    '<div class="card-title">' + (isEdit ? '编辑版本' : '新建版本') + '</div>' +
    '<div id="formError"></div>' +
    '<div class="form-row"><label>版本号</label><input type="text" id="fVer" value="' + ver + '" placeholder="例如 1.53.0"></div>' +
    '<div class="form-row"><label>更新内容</label><textarea id="fChangelog" placeholder="版本更新说明">' + changelog + '</textarea></div>' +
    '<div class="platform-grid">' +
    '<div class="platform-box"><label>🪟 Windows 下载链接</label><input type="text" id="fWinUrl" value="' + dw + '" placeholder="https://..."></div>' +
    '<div class="platform-box"><label>🐧 Linux 下载链接</label><input type="text" id="fLinuxUrl" value="' + dl + '" placeholder="https://..."></div>' +
    '<div class="platform-box"><label>📱 Android 下载链接</label><input type="text" id="fAndroidUrl" value="' + da + '" placeholder="https://..."></div>' +
    '</div>' +
    '<div style="margin-top:12px" class="btn-group">' +
    '<button onclick="saveVersion(\'' + (isEdit ? v.version : '') + '\')">' + (isEdit ? '保存修改' : '创建版本（草稿）') + '</button>' +
    (isEdit ? '<button class="danger btn-sm" onclick="cancelEdit()">取消</button>' : '') +
    '</div></div>';
}

async function saveVersion(verId) {
  const version = document.getElementById('fVer').value.trim();
  const changelog = document.getElementById('fChangelog').value.trim();
  const windowsUrl = document.getElementById('fWinUrl').value.trim();
  const linuxUrl = document.getElementById('fLinuxUrl').value.trim();
  const androidUrl = document.getElementById('fAndroidUrl').value.trim();
  
  if (!version) { showError('请输入版本号'); return; }
  
  try {
    if (verId) {
      await api('/versions/' + verId, { method: 'PUT', body: JSON.stringify({ version, changelog, windowsUrl, linuxUrl, androidUrl }) });
    } else {
      await api('/versions', { method: 'POST', body: JSON.stringify({ version, changelog, windowsUrl, linuxUrl, androidUrl }) });
    }
    editingId = null;
    await loadVersions();
  } catch (e) {
    showError('保存失败: ' + e.message);
  }
}

async function submitReview(ver) {
  try {
    await api('/versions/' + ver.version + '/submit-review', { method: 'POST' });
    await loadVersions();
  } catch (e) { showError(e.message); }
}

async function publish(ver) {
  try {
    await api('/versions/' + ver.version + '/publish', { method: 'POST' });
    await loadVersions();
  } catch (e) { showError(e.message); }
}

async function deleteVersion(ver) {
  if (!confirm('确定删除版本 ' + ver.version + ' 吗？')) return;
  try {
    await api('/versions/' + ver.version, { method: 'DELETE' });
    await loadVersions();
  } catch (e) { showError(e.message); }
}

function editVersion(ver) {
  editingId = ver.version;
  render();
  document.getElementById('formArea').innerHTML = renderForm(ver);
  document.getElementById('fVer').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  render();
}

function showError(msg) {
  const el = document.getElementById('formError');
  if (el) el.innerHTML = '<div class="error">' + msg + '</div>';
}

function render() {
  let html = '';
  
  // Form
  if (!editingId) {
    html += '<div id="formArea">' + renderForm(null) + '</div>';
  } else {
    html += '<div id="formArea"></div>';
  }
  
  // Version table
  html += '<div class="card"><div class="card-title">版本列表 (' + versions.length + ')</div>';
  if (versions.length === 0) {
    html += '<div class="loading">暂无版本</div>';
  } else {
    html += '<table><thead><tr>' +
      '<th>版本号</th><th>更新内容</th><th>状态</th><th>发布日期</th><th>下载链接</th><th>操作</th>' +
      '</tr></thead><tbody>';
    for (const v of versions) {
      const dl = v.downloadUrls || {};
      html += '<tr>' +
        '<td style="font-weight:600">v' + v.version + '</td>' +
        '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (v.changelog || '-') + '</td>' +
        '<td>' + statusBadge(v.status) + '</td>' +
        '<td>' + (v.releaseDate ? new Date(v.releaseDate).toLocaleDateString('zh-CN') : '-') + '</td>' +
        '<td><div class="dl-links">' +
          dlButton(dl.windows, 'Win', 'win') +
          dlButton(dl.linux, 'Linux', 'linux') + 
          dlButton(dl.android, 'APK', 'android') +
        '</div></td>' +
        '<td><div class="btn-group">' +
          '<button class="btn-sm success" onclick="editVersion(versions.find(x=>x.version===\'' + v.version + '\'))">编辑</button>' +
          (v.status === 'draft' ? '<button class="btn-sm" onclick="submitReview(versions.find(x=>x.version===\'' + v.version + '\'))">提交审核</button>' : '') +
          (v.status === 'pending_review' || v.status === 'draft' ? '<button class="btn-sm success" onclick="publish(versions.find(x=>x.version===\'' + v.version + '\'))">发布</button>' : '') +
          '<button class="btn-sm danger" onclick="deleteVersion(versions.find(x=>x.version===\'' + v.version + '\'))">删除</button>' +
        '</div></td>' +
        '</tr>';
    }
    html += '</tbody></table>';
  }
  html += '</div>';
  
  document.getElementById('app').innerHTML = html;
}

init();
</script>
</body>
</html>
