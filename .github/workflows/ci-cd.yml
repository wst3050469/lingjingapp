name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  ADMIN_IMAGE: lingjing-admin
  SERVER_IMAGE: lingjing-server
  LANDING_IMAGE: lingjing-landing

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable pnpm
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('cloud-admin/pnpm-lock.yaml', 'cloud-landing/pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
        working-directory: cloud-admin
      - run: pnpm run build
        working-directory: cloud-admin
      - run: pnpm install --frozen-lockfile
        working-directory: cloud-landing
      - run: pnpm run build
        working-directory: cloud-landing
      - run: node -c cloud-server/server.js && node -c cloud-server/admin-api.js

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable pnpm
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
        working-directory: cloud-admin
      - run: pnpm install --frozen-lockfile
        working-directory: cloud-landing
      - run: pnpm install --frozen-lockfile
        working-directory: cloud-server
      - run: npm test --if-present
        working-directory: cloud-server

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/metadata-action@v5
        id: meta-landing
        with:
          images: ${{ env.REGISTRY }}/${{ env.LANDING_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: cloud-landing
          file: cloud-landing/Dockerfile
          push: true
          tags: ${{ steps.meta-landing.outputs.tags }}
          labels: ${{ steps.meta-landing.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v5
        id: meta-admin
        with:
          images: ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: cloud-admin
          file: cloud-admin/Dockerfile
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/metadata-action@v5
        id: meta-server
        with:
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: cloud-server
          file: cloud-server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_HOST }} << 'EOF'
          cd /opt/lingjing/deploy
          docker compose pull
          docker compose up -d
          EOF
      - name: Verify staging health
        run: |
          sleep 15
          curl -sf http://${{ secrets.STAGING_HOST }}:8080/api/health | jq .status

  deploy-production:
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Blue-green deploy to production
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_HOST }} << EOF
          cd /opt/lingjing/deploy
          bash deploy-blue-green.sh $TAG
          EOF
      - name: Verify production health
        run: |
          sleep 20
          curl -sf http://${{ secrets.PRODUCTION_HOST }}/api/health | jq .status
