<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>灵境IDE - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex}
#app{display:flex;height:100vh;width:100%}
.sidebar{width:220px;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:16px 14px;border-bottom:1px solid #21262d;color:#58a6ff;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.sidebar-nav a{display:flex;align-items:center;gap:8px;padding:10px 16px;color:#8b949e;text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:all 0.15s}
.sidebar-nav a:hover{background:rgba(88,166,255,0.08);color:#c9d1d9}
.sidebar-nav a.active{background:rgba(88,166,255,0.12);color:#58a6ff;border-left-color:#58a6ff}
.sidebar-nav .sub{padding-left:32px;font-size:12px}
.sidebar-version{padding:12px 16px;border-top:1px solid #21262d;color:#484f58;font-size:11px}
.main{flex:1;display:flex;flex-direction:column}
.topbar{height:48px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:14px;font-weight:600;flex-shrink:0}
.topbar-title{color:#c9d1d9}
.topbar-btn{background:none;border:none;color:#8b949e;cursor:pointer;font-size:12px;padding:4px 12px;border-radius:6px}
.topbar-btn:hover{color:#f85149;background:rgba(248,81,73,0.1)}
.content{flex:1;padding:20px;overflow-y:auto}
.login-box{max-width:400px;margin:auto;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:28px}
.login-box h2{color:#58a6ff;text-align:center;margin-bottom:20px;font-size:18px}
.login-box label{display:block;color:#8b949e;font-size:12px;margin-bottom:4px;margin-top:12px}
.login-box input{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:10px 12px;border-radius:6px;font-size:14px;box-sizing:border-box}
.login-box input:focus{border-color:#58a6ff;outline:none}
.login-box .btn{width:100%;margin-top:16px;padding:10px;background:#1f6feb;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600}
.login-box .btn:hover{background:#388bfd}
.login-box .btn:disabled{opacity:0.5;cursor:default}
.login-error{color:#f85149;font-size:12px;text-align:center;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;display:flex;gap:12px;align-items:flex-start}
.stat-card:hover{border-color:#58a6ff}
.stat-icon{font-size:24px;flex-shrink:0}
.stat-value{font-size:24px;font-weight:700;color:#c9d1d9;line-height:1.2}
.stat-label{font-size:11px;color:#8b949e;margin-top:2px}
.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:18px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #21262d}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#8b949e;font-weight:600;padding:10px 12px;border-bottom:1px solid #21262d;font-size:12px}
td{padding:10px 12px;border-bottom:1px solid #0d1117;color:#c9d1d9}
tr:hover td{background:rgba(88,166,255,0.04)}
.btn-sm{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin-right:4px}
.btn-sm:hover{background:#30363d}
.btn-sm.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn-sm.danger{background:#da3633;border-color:#da3633;color:#fff}
.btn-sm.success{background:#238636;border-color:#238636;color:#fff}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-success{background:rgba(63,185,80,0.15);color:#3fb950}
.tag-warning{background:rgba(210,168,70,0.15);color:#d29922}
.tag-danger{background:rgba(248,81,73,0.15);color:#f85149}
.tag-info{background:rgba(88,166,255,0.15);color:#58a6ff}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.toolbar input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;font-size:12px;width:200px}
.toolbar input:focus{border-color:#58a6ff;outline:none}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#161b22;border:1px solid #30363d;border-radius:10px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal-header{color:#c9d1d9;font-size:14px;font-weight:600;padding:14px 18px;border-bottom:1px solid #21262d}
.modal-body{padding:18px}
.modal-footer{padding:10px 18px;border-top:1px solid #21262d;display:flex;justify-content:flex-end;gap:8px}
.modal label{display:block;color:#8b949e;font-size:11px;margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:8px 10px;border-radius:6px;font-size:13px;box-sizing:border-box}
.modal textarea{resize:vertical;min-height:80px}
.modal input:focus,.modal select:focus{border-color:#58a6ff;outline:none}
.empty{text-align:center;padding:40px;color:#484f58;font-size:14px}
.loading{text-align:center;padding:40px;color:#8b949e}
.toast{position:fixed;top:20px;right:20px;z-index:2000;background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;animation:fadeIn 0.3s}
.toast.error{background:#da3633}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.qa-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 8px;background:#0d1117;border:1px solid #21262d;border-radius:8px;cursor:pointer;text-align:center;transition:all 0.15s}
.qa-btn:hover{border-color:#58a6ff;box-shadow:0 0 8px rgba(88,166,255,0.1)}
.qa-icon{font-size:28px;margin-bottom:6px}
.qa-label{font-size:12px;color:#c9d1d9;font-weight:600}
.log-stream{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;font-family:"JetBrains Mono",monospace;font-size:12px;color:#8b949e;max-height:400px;overflow-y:auto;white-space:pre-wrap}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.sidebar{width:180px}.stats{grid-template-columns:1fr 1fr}}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" style="display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:#0d1117">
    <div class="login-box">
      <h2>&#128274; 灵境管理后台</h2>
      <label>用户名</label>
      <input id="loginUser" value="admin" placeholder="admin" autocomplete="username"/>
      <label>密码</label>
      <input id="loginPwd" type="password" placeholder="输入密码" autocomplete="current-password" onkeyup="if(event.key==='Enter')doLogin()"/>
      <button class="btn" id="loginBtn" onclick="doLogin()">登录</button>
      <div class="login-error" id="loginError" style="display:none"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden" style="display:flex;height:100vh;width:100%">
    <div class="sidebar">
      <div class="sidebar-header">&#9889; 灵境管理</div>
      <div class="sidebar-nav" id="sideNav"></div>
      <div class="sidebar-version">v1.71.0</div>
    </div>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title" id="pageTitle">数据总览</span>
        <button class="topbar-btn" onclick="doLogout()">退出</button>
      </div>
      <div class="content" id="pageContent"></div>
    </div>
  </div>
</div>
<div id="toast" class="toast hidden"></div>
<div id="modalOverlay" class="modal-overlay hidden"></div>
<script>/* ALL JS INLINE - ZERO CDN */</script>
<script src="/admin/admin.js?v=2"></script>
<script src="/admin/admin-crud.js?v=2"></script>
</body>
</html>
