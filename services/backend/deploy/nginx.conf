upstream lingjing_backend {
    least_conn;
    
    server 127.0.0.1:8000 weight=5 max_fails=3 fail_timeout=30s;
    
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

upstream lingjing_ws {
    ip_hash;
    
    server 127.0.0.1:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=60r/m;

limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name ide.zhejiangjinmo.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ide.zhejiangjinmo.com;
    
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    location /admin/ {
        root /var/www/html;
        index index.html;
        try_files $uri /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        location ~ \.(js|css|png|jpg|svg|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    location /downloads/ {
        root /var/www/html;
        autoindex on;
        add_header Cache-Control "public, max-age=3600";
        location ~ \.(exe|AppImage|deb|yml)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:;" always;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    
    limit_conn conn_limit 100;
    
    location /health {
        access_log off;
        proxy_pass http://lingjing_backend/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://lingjing_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
    
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://lingjing_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    location /ws {
        limit_req zone=ws_limit burst=10 nodelay;
        proxy_pass http://lingjing_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /latest.yml {
        proxy_pass http://127.0.0.1:3000/latest.yml;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    location ~ /\.(git|svn|hg) {
        deny all;
        return 404;
    }
    
    location ~ /(wp-admin|wp-login|phpmyadmin) {
        deny all;
        return 404;
    }
}